spring.application.name=ss13
spring.autoconfigure.exclude=org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration,org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration


# datasource
spring.datasource.url=jdbc:mysql://localhost:3306/ss13?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123456

# jpa
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.show_sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


logging.level.root=INFO
logging.level.com.example.ss13.controller=DEBUG
logging.level.com.example.ss13.service=DEBUG
logging.level.com.example.ss13.aspect=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%level] %logger{36} - %msg%n
